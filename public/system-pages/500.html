<!doctype html>
<html lang="sq">
<head>
    <meta charset="utf-8">
    <title>500 | Tadeo Bar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root{--bg:#050505;--panel:#111;--gold:#d9a441;--gold-light:#f3c96d;--text:#f8f1e7;--muted:#bdb3a6;--line:rgba(217,164,65,.30)}
        *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 20% 0%,rgba(217,164,65,.18),transparent 28%),linear-gradient(180deg,#050505,#0b0b0b);color:var(--text);font-family:Arial,Helvetica,sans-serif}
        .card{width:min(100%,520px);padding:28px;border:1px solid var(--line);border-radius:26px;background:rgba(17,17,17,.96);box-shadow:0 28px 85px rgba(0,0,0,.60);text-align:center}
        .code{display:inline-flex;align-items:center;justify-content:center;min-width:92px;height:48px;margin-bottom:16px;border-radius:999px;border:1px solid rgba(243,201,109,.45);background:rgba(217,164,65,.12);color:var(--gold-light);font-weight:900;font-size:20px}
        h1{margin:0 0 12px;color:var(--gold-light);font-family:Georgia,serif;font-size:38px;line-height:1.1} p{margin:0 auto 22px;max-width:420px;color:var(--muted);font-size:16px;line-height:1.55}.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:12px 18px;border-radius:14px;text-decoration:none;font-weight:900}.btn-primary{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#111}.btn-secondary{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text)}
        @media(max-width:480px){.card{padding:24px;border-radius:22px}h1{font-size:32px}.actions{display:grid;grid-template-columns:1fr}.btn{width:100%}}
</style>
</head>
<body>
    <main class="card">
        <div class="code">500</div>
        <h1>Gabim i brendshëm</h1>
        <p>Ndodhi një problem i përkohshëm në faqe. Provo përsëri më vonë.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/">Kthehu te menuja</a>
        </div>
    </main>
</body>
</html>
